<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME MARKET | @BlameJohn2014</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --tg-gold: #fbbf24;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 80px;
        }
        header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(to bottom, #1e1b4b, var(--bg-color));
        }
        .logo {
            font-size: 28px; font-weight: 900; color: var(--accent-color);
            text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            text-align: center; border: 1px solid #334155;
        }
        .stars-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--tg-gold);
            padding: 25px;
            border-radius: 25px;
        }
        .card i { font-size: 40px; margin-bottom: 10px; display: block; }
        .btn-buy {
            background: var(--accent-color); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: bold; margin-top: 10px;
        }
        .slider-container { margin: 20px 0; text-align: left; }
        input[type="range"] {
            width: 100%; height: 8px; border-radius: 5px;
            background: #334155; outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: var(--tg-gold); cursor: pointer;
            box-shadow: 0 0 10px var(--tg-gold);
        }
        .calc-info {
            display: flex; justify-content: space-between;
            font-size: 18px; font-weight: bold; margin-bottom: 10px;
        }
        .input-manual {
            width: 100%; padding: 10px; background: #0f172a;
            border: 1px solid #334155; color: white; border-radius: 8px;
            margin: 10px 0; text-align: center; font-size: 16px;
        }
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #1e293b;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #334155;
        }
        .nav-item { text-align: center; color: #94a3b8; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAME MARKET</div>
    <p style="font-size: 12px; color: #94a3b8;">Лучшие цены от @BlameJohn2014</p>
</header>

<div class="container">
    <div class="card stars-card">
        <i class="fas fa-star" style="color: var(--tg-gold);"></i>
        <h3 style="margin:0;">Telegram Stars</h3>
        
        <div class="slider-container">
            <div class="calc-info">
                <span id="starCount">250 Звёзд</span>
                <span id="starPrice" style="color: #4ade80;">392.50 ₽</span>
            </div>
            <input type="range" id="starSlider" min="50" max="2500" step="10" value="250" oninput="updateStars()">
            <input type="number" id="starInput" class="input-manual" placeholder="Или введите количество" oninput="updateStars(true)">
            <input type="text" id="starNick" class="input-manual" placeholder="Ваш ник/ID в Telegram">
        </div>
        
        <button class="btn-buy" style="background: var(--tg-gold); color: #000;" onclick="buyStars()">КУПИТЬ ЗВЁЗДЫ</button>
    </div>

    <div class="card">
        <i class="fas fa-bolt" style="color: #60a5fa;"></i>
        <h3>Brawl Stars</h3>
        <button class="btn-buy" onclick="window.scrollTo(0, 500); alert('Крути вниз к выбору товаров!')">КУПИТЬ</button>
    </div>

    <div class="card">
        <i class="fas fa-gem" style="color: #f472b6;"></i>
        <h3>Roblox</h3>
        <button class="btn-buy" onclick="window.scrollTo(0, 500); alert('Крути вниз к выбору товаров!')">КУПИТЬ</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item"><i class="fas fa-store"></i>Маркет</a>
    <a href="#" class="nav-item"><i class="fas fa-fire"></i>Новости</a>
    <a href="#" class="nav-item"><i class="fas fa-check-circle"></i>Отзывы</a>
</nav>

<script>
    // Новый курс: 1.57 за одну звезду
    const rate = 1.57;

    function updateStars(fromInput = false) {
        const slider = document.getElementById('starSlider');
        const input = document.getElementById('starInput');
        const countText = document.getElementById('starCount');
        const priceText = document.getElementById('starPrice');
        
        let value = fromInput ? input.value : slider.value;
        if (value < 0) value = 0;
        
        if (!fromInput) input.value = value;
        else slider.value = value;
        
        countText.innerText = value + ' Звёзд';
        priceText.innerText = (value * rate).toFixed(2) + ' ₽';
    }

    function buyStars() {
        const count = document.getElementById('starInput').value || 250;
        const price = (count * rate).toFixed(2);
        const nick = document.getElementById('starNick').value;
        
        if(!nick) {
            alert('Введите ваш ник в Телеграм!');
            return;
        }
        
        const text = `Привет! Я хочу купить ${count} Telegram Stars за ${price} ₽. Мой ник: ${nick}`;
        window.open(`https://t.me/BlameJohn2014?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>

</body>
</html>
