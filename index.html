<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME MARKET | 800 RBX GIVEAWAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --gold: #fbbf24;
            --roblox-pink: #f472b6;
            --brawl-yellow: #facc15;
            --genshin-teal: #4db2ff;
            --pubg-green: #34d399;
            --so2-orange: #ff8c00;
            --spotify-green: #1db954;
            --box-gradient: linear-gradient(45deg, #f59e0b, #ef4444, #8b5cf6, #f59e0b);
            --giveaway-bg: linear-gradient(90deg, #f472b6, #6366f1, #f472b6);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        .giveaway-banner {
            background: var(--giveaway-bg);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            padding: 18px;
            text-align: center;
            font-weight: 800;
            border-bottom: 3px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .giveaway-timer {
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(to bottom, #1e1b4b, var(--bg-color));
        }

        .container {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid #334155;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .full-width { grid-column: span 2; }

        .box-card {
            background: #000;
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), var(--box-gradient);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 400% 400%;
            animation: gradient-move 5s infinite;
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-buy {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-cancel {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-size: 13px;
        }

        .input-manual, .select-style {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 10px;
            margin: 8px 0;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 25px;
            width: 85%;
            max-width: 350px;
            border: 1px solid #334155;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        #prizeDisplay { font-size: 24px; font-weight: 900; color: var(--gold); margin: 20px 0; min-height: 35px; }
        .win-anim { animation: win-glow 0.5s ease-in-out infinite alternate; }
        @keyframes win-glow { from { transform: scale(1); } to { transform: scale(1.15); } }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #334155;
            z-index: 1000;
        }

        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }

        .info-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 3px solid var(--accent-color);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="giveaway-banner" onclick="window.open('https://t.me/BlameJohn2014?text=Участие в 800 RBX')">
    <div>🎁 РОЗЫГРЫШ 800 ROBUX 🎁</div>
    <div class="giveaway-timer">ДО ИТОГОВ: <span id="timer">02:59:59</span></div>
</div>

<header>
    <div style="font-size: 28px; font-weight: 900; color: var(--accent-color);">GAME MARKET</div>
    <div style="font-size: 11px; color: #4ade80;">● ОПЕРАТОР ОНЛАЙН</div>
</header>

<div class="container">
    <div class="card full-width box-card" onclick="openModal('boxModal')">
        <i class="fas fa-parachute-box" style="font-size: 40px; color: var(--gold);"></i>
        <h2>GOLD BOX</h2>
        <button class="btn-buy" style="background: var(--gold); color: #000;">ОТКРЫТЬ 200 ₽</button>
    </div>

    <div class="card" onclick="openModal('so2Modal')">
        <i class="fas fa-hand-fist" style="color: var(--so2-orange);"></i>
        <h3>Standoff 2</h3>
        <button class="btn-buy" style="background: var(--so2-orange);">GOLD</button>
    </div>

    <div class="card" onclick="openModal('pubgModal')">
        <i class="fas fa-gun" style="color: var(--pubg-green);"></i>
        <h3>PUBG UC</h3>
        <button class="btn-buy" style="background: var(--pubg-green);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('robloxModal')">
        <i class="fas fa-gem" style="color: var(--roblox-pink);"></i>
        <h3>Robux</h3>
        <button class="btn-buy" style="background: var(--roblox-pink);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('brawlModal')">
        <i class="fas fa-bolt" style="color: var(--brawl-yellow);"></i>
        <h3>Brawl</h3>
        <button class="btn-buy" style="background: var(--brawl-yellow); color: #000;">ГЕМЫ</button>
    </div>

    <div class="card" onclick="openModal('genshinModal')">
        <i class="fas fa-wind" style="color: var(--genshin-teal);"></i>
        <h3>Genshin</h3>
        <button class="btn-buy" style="background: var(--genshin-teal);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('discordModal')">
        <i class="fab fa-discord" style="color: #5865f2;"></i>
        <h3>Discord</h3>
        <button class="btn-buy" style="background: #5865f2;">NITRO</button>
    </div>

    <div class="card" onclick="openModal('spotifyModal')">
        <i class="fab fa-spotify" style="color: var(--spotify-green);"></i>
        <h3>Spotify</h3>
        <button class="btn-buy" style="background: var(--spotify-green);">PREMIUM</button>
    </div>

    <div class="card" onclick="openModal('steamModal')">
        <i class="fab fa-steam" style="color: #66c0f4;"></i>
        <h3>Steam</h3>
        <button class="btn-buy" style="background: #66c0f4;">+7%</button>
    </div>
</div>

<div id="so2Modal" class="modal">
    <div class="modal-content">
        <h2>Standoff 2 Gold</h2>
        <select id="so2Select" class="select-style">
            <option value="100 Gold - 160">100 Gold — 160 ₽</option>
            <option value="500 Gold - 680">500 Gold — 680 ₽</option>
            <option value="1000 Gold - 1250">1000 Gold — 1250 ₽</option>
            <option value="Gold Pass - 850">Gold Pass — 850 ₽</option>
        </select>
        <input type="text" id="so2Id" class="input-manual" placeholder="Ваш ID в SO2">
        <button class="btn-buy" style="background: var(--so2-orange);" onclick="sendOrder('Standoff 2', document.getElementById('so2Select').value, document.getElementById('so2Id').value)">КУПИТЬ</button>
        <button class="btn-cancel" onclick="closeAll()">Назад</button>
    </div>
</div>

<div id="pubgModal" class="modal">
    <div class="modal-content">
        <h2>PUBG Mobile</h2>
        <select id="pubgSelect" class="select-style">
            <option value="60 UC - 86">60 UC — 86 ₽</option>
            <option value="325 UC - 408">325 UC — 408 ₽</option>
            <option value="Elite Pass - 927">Elite Pass — 927 ₽</option>
        </select>
        <input type="text" id="pubgId" class="input-manual" placeholder="ID игрока">
        <button class="btn-buy" onclick="sendOrder('PUBG', document.getElementById('pubgSelect').value, document.getElementById('pubgId').value)">КУПИТЬ</button>
        <button class="btn-cancel" onclick="closeAll()">Назад</button>
    </div>
</div>

<div id="robloxModal" class="modal">
    <div class="modal-content">
        <h2>Roblox (Gamepass)</h2>
        <input type="number" id="rbxInput" class="input-manual" placeholder="Кол-во R$" oninput="calcRbx()">
        <div style="font-size:22px; font-weight:bold; color:#4ade80;"><span id="rbxPrice">0</span> ₽</div>
        <input type="text" id="rbxNick" class="input-manual" placeholder="Ваш ник">
        <button class="btn-buy" onclick="sendOrder('Roblox', document.getElementById('rbxInput').value, document.getElementById('rbxNick').value)">КУПИТЬ</button>
        <button class="btn-cancel" onclick="closeAll()">Назад</button>
    </div>
</div>

<div id="genshinModal" class="modal">
    <div class="modal-content">
        <h2>Genshin (+10₽)</h2>
        <select id="genshinSelect" class="select-style">
            <option value="Луна - 318">Луна — 318 ₽</option>
            <option value="60 Crystals - 75">60 Кристаллов — 75 ₽</option>
        </select>
        <input type="text" id="genshinUID" class="input-manual" placeholder="UID">
        <button class="btn-buy" onclick="sendOrder('Genshin', document.getElementById('genshinSelect').value, document.getElementById('genshinUID').value)">КУПИТЬ</button>
        <button class="btn-cancel" onclick="closeAll()">Назад</button>
    </div>
</div>

<div id="boxModal" class="modal">
    <div class="modal-content">
        <h2>Gold Box</h2>
        <div id="prizeDisplay">???</div>
        <button class="btn-buy" onclick="sendOrder('GOLD BOX', '200 ₽')">ОПЛАТИТЬ 200 ₽</button>
        <button onclick="startSpinning()" style="margin-top:10px; cursor:pointer; background:none; border:none; color:#555; text-decoration:underline;">Демо-прокрутка</button>
        <button class="btn-cancel" onclick="closeAll()">Назад</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item" onclick="closeAll()"><i class="fas fa-store"></i>Маркет</div>
    <div class="nav-item" onclick="openModal('newsModal')"><i class="fas fa-bullhorn"></i>Новости</div>
    <div class="nav-item" onclick="openModal('reviewsModal')"><i class="fas fa-star"></i>Отзывы</div>
</nav>

<script>
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function openModal(id) { closeAll(); document.getElementById(id).style.display = 'flex'; }
    function calcRbx() { let v = document.getElementById('rbxInput').value; document.getElementById('rbxPrice').innerText = Math.round(v * 1.47); }
    function sendOrder(item, val, nick = '') { window.open(`https://t.me/BlameJohn2014?text=Заказ: ${item} (${val}). Данные: ${nick}`); }
    
    function startSpinning() {
        const prizes = ["800 Robux 💎", "100 Gold 🔫", "60 UC 🔫", "400 Robux 💎"];
        const display = document.getElementById('prizeDisplay');
        display.classList.remove('win-anim');
        let counter = 0;
        let interval = setInterval(() => {
            display.innerText = prizes[Math.floor(Math.random() * prizes.length)];
            counter++;
            if (counter > 15) { clearInterval(interval); display.innerText = prizes[Math.floor(Math.random() * prizes.length)]; display.classList.add('win-anim'); }
        }, 100);
    }

    let seconds = 10800; 
    setInterval(() => {
        let h = Math.floor(seconds / 3600); let m = Math.floor((seconds % 3600) / 60); let s = seconds % 60;
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(seconds > 0) seconds--;
    }, 1000);
</script>

</body>
</html>
