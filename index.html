<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME MARKET | @BlameJohn2014</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --tg-gold: #fbbf24;
            --steam-light: #66c0f4;
            --roblox-pink: #f472b6;
            --discord-blurple: #5865f2;
            --spotify-green: #1db954;
            --genshin-teal: #4db2ff;
        }

        /* Заставка (Preloader) */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-color);
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        .loader-bar {
            width: 150px;
            height: 4px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            animation: loading 3.5s forwards;
        }
        @keyframes loading { to { width: 100%; } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 30px 20px 20px;
            background: linear-gradient(to bottom, #1e1b4b, var(--bg-color));
            animation: fadeInDown 1s ease;
        }

        .online-status {
            display: inline-flex;
            align-items: center;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .dot { height: 8px; width: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 7px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            animation: fadeInUp 1s ease;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            border: 1px solid #334155; 
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-color); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .stars-card { grid-column: span 2; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--tg-gold); }
        .card i { font-size: 40px; margin-bottom: 10px; display: block; }
        
        .btn-buy { background: var(--accent-color); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .input-manual { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; margin: 10px 0; text-align: center; font-size: 16px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; border: 1px solid var(--accent-color); max-height: 85vh; overflow-y: auto; animation: zoomIn 0.3s ease; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 999; }
        .nav-item { text-align: center; color: #94a3b8; text-decoration: none; font-size: 12px; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

<div id="preloader">
    <div class="loader-logo">GAME MARKET</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
    <p style="color: #94a3b8; font-size: 12px; margin-top: 15px;">Загрузка маркета...</p>
</div>

<header>
    <div style="font-size: 28px; font-weight: 900; color: var(--accent-color); letter-spacing: 3px;">GAME MARKET</div>
    <div class="online-status"><span class="dot"></span>ОПЕРАТОР В СЕТИ</div>
</header>

<div class="container">
    <div class="card stars-card">
        <i class="fas fa-star" style="color: var(--tg-gold);"></i>
        <h3>Telegram Stars</h3>
        <input type="range" id="starSlider" min="50" max="2500" step="10" value="250" style="width:100%" oninput="updateStars()">
        <div style="display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold;">
            <span id="starCount">250 Звёзд</span>
            <span id="starPrice" style="color: #4ade80;">380.00 ₽</span>
        </div>
        <input type="text" id="starNick" class="input-manual" placeholder="Ник в Telegram">
        <button class="btn-buy" style="background: var(--tg-gold); color: #000;" onclick="buyStars()">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openRobloxModal()">
        <i class="fas fa-gem" style="color: var(--roblox-pink);"></i>
        <h3>Roblox</h3>
        <button class="btn-buy" style="background: var(--roblox-pink);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('Genshin Impact')">
        <i class="fas fa-wind" style="color: var(--genshin-teal);"></i>
        <h3>Genshin</h3>
        <button class="btn-buy" style="background: var(--genshin-teal);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('Discord Nitro')">
        <i class="fab fa-discord" style="color: var(--discord-blurple);"></i>
        <h3>Nitro</h3>
        <button class="btn-buy" style="background: var(--discord-blurple);">КУПИТЬ</button>
    </div>

    <div class="card" onclick="openModal('Spotify Premium')">
        <i class="fab fa-spotify" style="color: var(--spotify-green);"></i>
        <h3>Spotify</h3>
        <button class="btn-buy" style="background: var(--spotify-green);">КУПИТЬ</button>
    </div>
</div>

<div id="robloxModal" class="modal">
    <div class="modal-content" style="border-color: var(--roblox-pink);">
        <h2 style="color: var(--roblox-pink);">Roblox</h2>
        <p style="font-size: 11px; color: #94a3b8;">Курс: 1.47 ₽ за 1 R$</p>
        <input type="number" id="rbxAmount" class="input-manual" placeholder="Количество" oninput="calcRoblox()">
        <input type="text" id="rbxNick" class="input-manual" placeholder="Ник в Roblox">
        <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>Итого:</span><span id="rbxFinal" style="color:#4ade80;">0 ₽</span></div>
        <button class="btn-buy" onclick="sendRobloxOrder()" style="background: var(--roblox-pink);">ОПЛАТИТЬ</button>
        <button class="btn-buy" onclick="closeAll()" style="background:none; color:#94a3b8;">Отмена</button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Заказ</h2>
        <select id="itemSelect" class="input-manual"></select>
        <input type="text" id="userNick" class="input-manual" placeholder="Данные (Ник/UID)">
        <button class="btn-buy" onclick="sendOrder()" style="background: #22c55e;">ОПЛАТИТЬ</button>
        <button class="btn-buy" onclick="closeAll()" style="background:none;">Отмена</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item" onclick="closeAll()"><i class="fas fa-store"></i><br>Маркет</div>
    <div class="nav-item" onclick="alert('Stars: 1.52 | Robux: 1.47 | Genshin Луна: 490')"><i class="fas fa-fire"></i><br>Цены</div>
</nav>

<script>
    // Убираем заставку через 4 секунды
    setTimeout(() => {
        const preloader = document.getElementById('preloader');
        preloader.style.opacity = '0';
        setTimeout(() => preloader.style.display = 'none', 500);
    }, 4000);

    const starRate = 1.52;
    const rbxRate = 1.47;

    const prices = { 
        'Genshin Impact': [
            {n:'Полая луна',p:'490 ₽'},
            {n:'Боевой пропуск',p:'950 ₽'},
            {n:'60 Кристаллов',p:'99 ₽'},
            {n:'300+30 Кристаллов',p:'450 ₽'},
            {n:'980+110 Кристаллов',p:'1350 ₽'}
        ],
        'Discord Nitro': [{n:'Nitro Basic',p:'249 ₽'},{n:'Nitro Full',p:'590 ₽'}],
        'Spotify Premium': [{n:'Spotify (1 Месяц)',p:'299 ₽'},{n:'Spotify (12 Месяцев)',p:'2790 ₽'}]
    };

    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function openRobloxModal() { closeAll(); document.getElementById('robloxModal').style.display = 'flex'; }

    function updateStars() {
        const v = document.getElementById('starSlider').value;
        document.getElementById('starCount').innerText = v + ' Звёзд';
        document.getElementById('starPrice').innerText = (v * starRate).toFixed(2) + ' ₽';
    }

    function buyStars() {
        const v = document.getElementById('starSlider').value;
        const n = document.getElementById('starNick').value;
        if(!n) return alert('Ник!');
        window.open(`https://t.me/BlameJohn2014?text=Stars: ${v}. Ник: ${n}`);
    }

    function calcRoblox() {
        const a = parseFloat(document.getElementById('rbxAmount').value) || 0;
        document.getElementById('rbxFinal').innerText = (a * rbxRate).toFixed(2) + ' ₽';
    }

    function sendRobloxOrder() {
        const a = document.getElementById('rbxAmount').value;
        const n = document.getElementById('rbxNick').value;
        if(!a || !n) return alert('Заполни поля!');
        window.open(`https://t.me/BlameJohn2014?text=Roblox: ${a} R$. Ник: ${n}. Сумма: ${(a * rbxRate).toFixed(2)} ₽`);
    }

    let currentGame = '';
    function openModal(game) {
        closeAll(); currentGame = game;
        document.getElementById('modalTitle').innerText = game;
        const s = document.getElementById('itemSelect'); s.innerHTML = '';
        prices[game].forEach(i => {
            let o = document.createElement('option'); o.value = i.n; o.innerText = i.n+' - '+i.p; s.appendChild(o);
        });
        document.getElementById('orderModal').style.display = 'flex';
    }

    function sendOrder() {
        const i = document.getElementById('itemSelect').value;
        const n = document.getElementById('userNick').value;
        if(!n) return alert('Заполни данные!');
        window.open(`https://t.me/BlameJohn2014?text=${currentGame}: ${i}. Данные: ${n}`);
    }
</script>
</body>
    </html>
