<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME MARKET | @BlameJohn2014</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --tg-gold: #fbbf24;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 80px;
        }
        header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(to bottom, #1e1b4b, var(--bg-color));
        }
        .logo {
            font-size: 28px; font-weight: 900; color: var(--accent-color);
            text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            text-align: center; border: 1px solid #334155;
        }
        .stars-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--tg-gold);
            padding: 25px;
            border-radius: 25px;
        }
        .card i { font-size: 40px; margin-bottom: 10px; display: block; }
        .btn-buy {
            background: var(--accent-color); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: bold; margin-top: 10px;
        }
        .slider-container { margin: 20px 0; text-align: left; }
        input[type="range"] {
            width: 100%; height: 8px; border-radius: 5px;
            background: #334155; outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: var(--tg-gold); cursor: pointer;
        }
        .calc-info {
            display: flex; justify-content: space-between;
            font-size: 18px; font-weight: bold; margin-bottom: 10px;
        }
        .input-manual {
            width: 100%; padding: 10px; background: #0f172a;
            border: 1px solid #334155; color: white; border-radius: 8px;
            margin: 10px 0; text-align: center; font-size: 16px;
        }
        /* Стили модального окна */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); padding: 25px;
            border-radius: 25px; width: 85%; max-width: 350px;
            border: 1px solid var(--accent-color);
        }
        select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #0f172a; color: white; }
        
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #1e293b;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #334155;
        }
        .nav-item { text-align: center; color: #94a3b8; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAME MARKET</div>
    <p style="font-size: 12px; color: #94a3b8;">Лучшие цены от @BlameJohn2014</p>
</header>

<div class="container">
    <div class="card stars-card">
        <i class="fas fa-star" style="color: var(--tg-gold);"></i>
        <h3 style="margin:0;">Telegram Stars</h3>
        <div class="slider-container">
            <div class="calc-info">
                <span id="starCount">250 Звёзд</span>
                <span id="starPrice" style="color: #4ade80;">392.50 ₽</span>
            </div>
            <input type="range" id="starSlider" min="50" max="2500" step="10" value="250" oninput="updateStars()">
            <input type="number" id="starInput" class="input-manual" placeholder="Количество звёзд" oninput="updateStars(true)">
            <input type="text" id="starNick" class="input-manual" placeholder="Ваш ник в Telegram">
        </div>
        <button class="btn-buy" style="background: var(--tg-gold); color: #000;" onclick="buyStars()">КУПИТЬ ЗВЁЗДЫ</button>
    </div>

    <div class="card">
        <i class="fas fa-bolt" style="color: #60a5fa;"></i>
        <h3>Brawl Stars</h3>
        <button class="btn-buy" onclick="openModal('Brawl Stars')">КУПИТЬ</button>
    </div>

    <div class="card">
        <i class="fas fa-gem" style="color: #f472b6;"></i>
        <h3>Roblox</h3>
        <button class="btn-buy" onclick="openModal('Roblox')">КУПИТЬ</button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top:0;">Заказ</h2>
        <select id="itemSelect"></select>
        <input type="text" id="userNick" class="input-manual" placeholder="Ваш ник в игре">
        <button class="btn-buy" onclick="sendOrder()" style="background: #22c55e;">ОПЛАТИТЬ</button>
        <button style="background:none; border:none; color:#94a3b8; margin-top:15px; width:100%; cursor:pointer;" onclick="closeModal()">Отмена</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item"><i class="fas fa-store"></i>Маркет</a>
    <a href="#" class="nav-item"><i class="fas fa-fire"></i>Новости</a>
    <a href="#" class="nav-item"><i class="fas fa-check-circle"></i>Отзывы</a>
</nav>

<script>
    const rate = 1.57;
    const prices = {
        'Brawl Stars': [
            {n: '30 Гемов', p: '230 ₽'},
            {n: '80 Гемов', p: '550 ₽'},
            {n: '170 Гемов', p: '1050 ₽'},
            {n: 'Brawl Pass', p: '850 ₽'}
        ],
        'Roblox': [
            {n: '400 Robux', p: '550 ₽'},
            {n: '800 Robux', p: '990 ₽'},
            {n: '1700 Robux', p: '1950 ₽'}
        ]
    };

    let currentGame = '';

    function updateStars(fromInput = false) {
        const slider = document.getElementById('starSlider');
        const input = document.getElementById('starInput');
        const countText = document.getElementById('starCount');
        const priceText = document.getElementById('starPrice');
        let value = fromInput ? input.value : slider.value;
        if (!fromInput) input.value = value;
        else slider.value = value;
        countText.innerText = value + ' Звёзд';
        priceText.innerText = (value * rate).toFixed(2) + ' ₽';
    }

    function buyStars() {
        const count = document.getElementById('starInput').value || 250;
        const price = (count * rate).toFixed(2);
        const nick = document.getElementById('starNick').value;
        if(!nick) { alert('Введите ник!'); return; }
        window.open(`https://t.me/BlameJohn2014?text=Купить ${count} Stars за ${price}₽. Ник: ${nick}`, '_blank');
    }

    function openModal(game) {
        currentGame = game;
        document.getElementById('modalTitle').innerText = game;
        const select = document.getElementById('itemSelect');
        select.innerHTML = '';
        prices[game].forEach(item => {
            let opt = document.createElement('option');
            opt.value = `${item.n} за ${item.p}`;
            opt.innerText = `${item.n} — ${item.p}`;
            select.appendChild(opt);
        });
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function sendOrder() {
        const item = document.getElementById('itemSelect').value;
        const nick = document.getElementById('userNick').value;
        if(!nick) { alert('Введите ник!'); return; }
        window.open(`https://t.me/BlameJohn2014?text=Купить ${item} в ${currentGame}. Ник: ${nick}`, '_blank');
        closeModal();
    }
</script>

</body>
</html>
