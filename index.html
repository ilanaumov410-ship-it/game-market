<style>
    /* Стили для рулетки кейса */
    .case-container {
        position: relative;
        width: 100%;
        height: 100px;
        background: #0f172a;
        border: 2px solid var(--accent-color);
        border-radius: 15px;
        overflow: hidden;
        margin: 20px 0;
    }
    .case-line {
        position: absolute;
        top: 0;
        left: 50%;
        width: 2px;
        height: 100%;
        background: var(--tg-gold);
        z-index: 10;
        box-shadow: 0 0 10px var(--tg-gold);
    }
    #caseCarousel {
        display: flex;
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        will-change: transform;
    }
    .case-item {
        min-width: 80px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-right: 1px solid #1e293b;
        background: #1e293b;
    }
    .case-item i { font-size: 20px; margin-bottom: 5px; }
    .case-item span { font-size: 10px; font-weight: bold; }
    
    /* Цвета редкости */
    .rarity-common { border-bottom: 4px solid #94a3b8; }
    .rarity-rare { border-bottom: 4px solid #6366f1; }
    .rarity-legendary { border-bottom: 4px solid var(--tg-gold); }
</style>

<div id="caseOpenModal" class="modal"><div class="modal-content">
    <h2 id="caseTitle">КЕЙС УДАЧИ</h2>
    <p style="font-size: 11px; opacity: 0.7;">Испытай удачу! Стоимость открытия: 79 ₽</p>
    
    <div class="case-container">
        <div class="case-line"></div>
        <div id="caseCarousel"></div>
    </div>

    <div id="caseStatus" style="margin: 10px; font-weight: bold; color: #4ade80; min-height: 20px;"></div>
    
    <button class="btn-buy" id="startCaseBtn" onclick="startOpening()">КРУТИТЬ ЗА 79 ₽</button>
    <button class="btn-buy" id="claimBtn" style="display:none; background: #4ade80;">ЗАБРАТЬ ПРИЗ</button>
    <button class="btn-cancel" id="closeCaseBtn" onclick="closeAll()">Назад</button>
</div></div>

<script>
    // Настройки призов (название, иконка, редкость, шанс в %)
    const CASE_PRIZES = [
        { name: "5 R$", icon: "fa-gem", rarity: "common", color: "#f472b6", chance: 50 },
        { name: "10 R$", icon: "fa-gem", rarity: "common", color: "#f472b6", chance: 30 },
        { name: "20 R$", icon: "fa-gem", rarity: "rare", color: "#6366f1", chance: 10 },
        { name: "40 R$", icon: "fa-gem", rarity: "rare", color: "#6366f1", chance: 7 },
        { name: "80 R$", icon: "fa-crown", rarity: "legendary", color: "#fbbf24", chance: 3 }
    ];

    let isOpening = false;

    function startOpening() {
        if (isOpening) return;
        isOpening = true;
        
        const carousel = document.getElementById('caseCarousel');
        const status = document.getElementById('caseStatus');
        const startBtn = document.getElementById('startCaseBtn');
        const claimBtn = document.getElementById('claimBtn');
        
        status.innerText = "Удача выбирает приз...";
        startBtn.disabled = true;
        startBtn.style.opacity = "0.5";
        
        // Генерируем ленту (80 случайных предметов)
        carousel.innerHTML = '';
        carousel.style.transition = 'none';
        carousel.style.transform = 'translateX(0)';
        
        let itemsHTML = '';
        for (let i = 0; i < 80; i++) {
            const p = CASE_PRIZES[Math.floor(Math.random() * CASE_PRIZES.length)];
            itemsHTML += `
                <div class="case-item rarity-${p.rarity}">
                    <i class="fas ${p.icon}" style="color:${p.color}"></i>
                    <span>${p.name}</span>
                </div>`;
        }
        carousel.innerHTML = itemsHTML;

        // Определяем финальный приз (через твои шансы)
        const winningPrize = getWinningPrize();
        
        // Вставляем выигрышный предмет на 75-ю позицию
        const winIndex = 75; 
        const items = document.querySelectorAll('.case-item');
        items[winIndex].innerHTML = `<i class="fas ${winningPrize.icon}" style="color:${winningPrize.color}"></i><span>${winningPrize.name}</span>`;
        items[winIndex].className = `case-item rarity-${winningPrize.rarity}`;

        // Запускаем анимацию
        setTimeout(() => {
            carousel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
            // Сдвиг: (ширина айтема 80px * индекс) - центровка
            const offset = (winIndex * 80) - (document.querySelector('.case-container').offsetWidth / 2) + 40;
            carousel.style.transform = `translateX(-${offset}px)`;
        }, 100);

        // Конец анимации
        setTimeout(() => {
            status.innerHTML = `ВЫ ВЫИГРАЛИ: <span style="color:${winningPrize.color}">${winningPrize.name}</span>`;
            claimBtn.style.display = 'block';
            claimBtn.onclick = () => {
                window.open(`https://t.me/BlameJohn2014?text=Я открыл кейс и выиграл: ${winningPrize.name}`);
            };
            isOpening = false;
        }, 5200);
    }

    function getWinningPrize() {
        let rand = Math.random() * 100;
        let cumulative = 0;
        for (let p of CASE_PRIZES) {
            cumulative += p.chance;
            if (rand < cumulative) return p;
        }
        return CASE_PRIZES[0];
    }

    // Обнови старую функцию клика по кейсу на главной:
    // Найди в HTML: onclick="window.open('https://t.me/...')" 
    // Замени на: onclick="openModal('caseOpenModal')"
</script>
